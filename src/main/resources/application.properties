# =============================================================
# Hashiji Cafe - Application Configuration
# =============================================================
spring.application.name=CoffeShopManager
spring.profiles.active=${APP_PROFILE:dev}

# Database (values injected from environment variables for security)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Thymeleaf
spring.thymeleaf.cache=false

# Server
server.port=${PORT:8080}

# Hikari / PgBouncer compatibility
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0

# Cache (use 'redis' in production if available)
spring.cache.type=simple
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Error Handling (disable stack-traces in production via profile override)
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false
