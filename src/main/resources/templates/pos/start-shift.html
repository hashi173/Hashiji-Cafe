<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Start Shift - Coffee POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .card {
            width: 100%;
            max-width: 600px;
            border: none;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .form-control-lg {
            font-size: 1.5rem;
            padding: 1rem;
        }

        .btn-lg {
            font-size: 1.3rem;
            padding: 1rem;
        }
    </style>
</head>

<body>
    <div class="card p-4">
        <div class="text-center mb-4">
            <h1 class="text-primary"><i class="fas fa-cash-register me-2"></i>Start Shift</h1>
            <p class="text-muted" th:text="'Welcome, ' + ${#authentication.name}"></p>
        </div>
        <form th:action="@{/pos/shift/start}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold">Opening Cash Amount (vnđ)</label>
                <input type="number" name="startCash" class="form-control form-control-lg" value="0" required min="0">
                <div class="form-text">Verified amount in cash drawer.</div>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">Open Register</button>
        </form>
    </div>
</body>

</html>
