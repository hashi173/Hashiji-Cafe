<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::div})}">

<body>
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Categories</h2>
            <a href="/admin/categories/new" class="btn btn-primary"><i class="fas fa-plus"></i> Add New</a>
        </div>

        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card shadow-sm mb-4">
            <div class="card-body py-3">
                <form action="/admin/categories" method="get" class="row g-2 align-items-center">
                    <div class="col-auto">
                        <label class="col-form-label fw-bold">Search:</label>
                    </div>
                    <div class="col-md-4">
                        <input type="text" name="search" class="form-control" placeholder="Category Name..."
                            th:value="${search}">
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-search"></i></button>
                        <a href="/admin/categories" class="btn btn-outline-secondary" title="Clear"><i
                                class="fas fa-times"></i></a>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow">
            <div class="card-body p-0">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cat : ${categories}">
                            <td th:text="${cat.id}">1</td>
                            <td th:text="${cat.name}">Coffee</td>
                            <td th:text="${cat.description}">Delicious Coffee</td>
                            <td>
                                <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}"
                                    class="btn btn-sm btn-info text-white"><i class="fas fa-edit"></i></a>
                                <a th:href="@{/admin/categories/delete/{id}(id=${cat.id})}"
                                    class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')"><i
                                        class="fas fa-trash"></i></a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(categories)}">
                            <td colspan="4" class="text-center py-4">No categories found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div
            th:replace="~{admin/fragments/pagination :: pagination(${currentPage}, ${totalPages}, '/admin/categories', ${search}, 'page')}">
        </div>

</body>

</html>
