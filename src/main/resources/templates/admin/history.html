<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::section})}">

<body>
    <section>
        <div class="container-fluid">
            <h2 class="mb-4">Business History & Analytics</h2>



            <!-- Chart Section -->
            <div class="card shadow mb-4">
                <div class="card-body py-3">
                    <form action="/admin/history" method="get" class="row g-2 align-items-center">
                        <div class="col-auto">
                            <label class="col-form-label fw-bold">Filter Stats:</label>
                        </div>
                        <div class="col-md-5">
                            <input type="text" name="search" class="form-control"
                                placeholder="Month (e.g. Jan), Year, Top Item..." th:value="${search}">
                        </div>
                        <div class="col-auto">
                            <button type="submit" class="btn btn-primary"><i class="fas fa-filter"></i> Filter</button>
                            <a href="/admin/history" class="btn btn-outline-secondary" title="Clear"><i
                                    class="fas fa-times"></i></a>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card shadow mb-5">
                <div class="card-header bg-white">
                    <h5 class="mb-0 fw-bold text-primary"><i class="fas fa-chart-bar me-2"></i>Monthly Performance</h5>
                </div>
                <div class="card-body">
                    <canvas id="historyChart" height="100"></canvas>
                </div>
            </div>

            <!-- Detailed Table -->
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0"><i class="fas fa-history me-2"></i>Monthly Records</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover mb-0 align-middle text-center">
                            <thead class="table-light">
                                <tr>
                                    <th>Month</th>
                                    <th>Revenue</th>
                                    <th>Expenses</th>
                                    <th>Net Profit</th>
                                    <th>Top Selling Item</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="stat : ${monthlyStats}">
                                    <td>
                                        <span class="fw-bold fs-5" th:text="${stat.monthName} + ' ' + ${stat.year}">Jan
                                            2025</span>
                                    </td>
                                    <td class="text-success">
                                        <i class="fas fa-arrow-up small"></i>
                                        <span
                                            th:text="${#numbers.formatDecimal(stat.revenue, 0, 'COMMA', 0, 'POINT')} + ' đ'">0
                                            đ</span>
                                    </td>
                                    <td class="text-danger">
                                        <i class="fas fa-arrow-down small"></i>
                                        <span
                                            th:text="${#numbers.formatDecimal(stat.expenses, 0, 'COMMA', 0, 'POINT')} + ' đ'">0
                                            đ</span>
                                    </td>
                                    <td>
                                        <span
                                            th:class="${stat.netProfit >= 0 ? 'badge bg-success fs-6' : 'badge bg-danger fs-6'}"
                                            th:text="${#numbers.formatDecimal(stat.netProfit, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                                            0 đ
                                        </span>
                                    </td>
                                    <td>
                                        <div th:if="${stat.topProductQuantity > 0}"
                                            class="d-flex align-items-center justify-content-center">
                                            <img th:src="${stat.topProductImage != null ? stat.topProductImage : 'https://placehold.co/40'}"
                                                class="rounded-circle border border-2 border-warning me-2" width="40"
                                                height="40" style="object-fit: cover;">
                                            <div class="text-start">
                                                <div class="fw-bold" th:text="${stat.topProductName}">Latte</div>
                                                <small class="text-muted"
                                                    th:text="${stat.topProductQuantity} + ' sold'">120
                                                    sold</small>
                                            </div>
                                        </div>
                                        <span th:unless="${stat.topProductQuantity > 0}" class="text-muted">-</span>
                                    </td>
                                    <td>
                                        <a th:href="@{/admin/history/details(month=${stat.month}, year=${stat.year})}"
                                            class="btn btn-sm btn-outline-primary" title="View Details">
                                            <i class="fas fa-eye"></i> View
                                        </a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(monthlyStats)}">
                                    <td colspan="5" class="py-4 text-muted">No history data available.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <div class="card-footer bg-white">
            <div
                th:replace="~{admin/fragments/pagination :: pagination(${currentPage}, ${totalPages}, '/admin/history', ${search}, 'page')}">
            </div>
        </div>
        </div>


        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script th:inline="javascript">
            document.addEventListener('DOMContentLoaded', function () {
                const canvas = document.getElementById('historyChart');
                if (!canvas) {
                    console.error('History chart canvas not found!');
                    return;
                }

                const ctx = canvas.getContext('2d');
                const labels = /*[[${chartLabels}]]*/[];
                const revenues = /*[[${chartRevenues}]]*/[];
                const expenses = /*[[${chartExpenses}]]*/[];
                const profits = /*[[${chartProfits}]]*/[];

                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Revenue',
                                data: revenues,
                                backgroundColor: 'rgba(25, 135, 84, 0.7)',
                                borderColor: '#198754',
                                borderWidth: 1
                            },
                            {
                                label: 'Expenses',
                                data: expenses,
                                backgroundColor: 'rgba(220, 53, 69, 0.7)',
                                borderColor: '#dc3545',
                                borderWidth: 1
                            },
                            {
                                label: 'Net Profit',
                                data: profits,
                                type: 'line',
                                borderColor: '#0d6efd',
                                backgroundColor: 'rgba(13, 110, 253, 0.1)',
                                borderWidth: 2,
                                fill: false,
                                tension: 0.3
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'top' },
                            tooltip: {
                                callbacks: {
                                    label: function (context) {
                                        let label = context.dataset.label || '';
                                        if (label) {
                                            label += ': ';
                                        }
                                        if (context.parsed.y !== null) {
                                            label += context.parsed.y.toLocaleString('vi-VN') + ' đ';
                                        }
                                        return label;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function (value) {
                                        return value.toLocaleString('vi-VN') + ' đ';
                                    }
                                }
                            }
                        }
                    }
                });
            });
        </script>

    </section>
</body>

</html>
