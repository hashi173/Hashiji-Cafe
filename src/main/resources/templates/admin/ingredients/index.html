<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::content})}">

<head>
    <title>Inventory Management</title>
</head>

<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0 fw-bold"><i class="fas fa-box me-2"></i>Inventory / Ingredients</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addIngredientModal">
                <i class="fas fa-plus me-2"></i>Add Ingredient
            </button>
        </div>

        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th class="ps-4">Ingredient Name</th>
                                <th>Unit</th>
                                <th>Stock Quantity</th>
                                <th>Cost Per Unit</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="ing : ${ingredients}">
                                <td class="ps-4 fw-bold" th:text="${ing.name}">Milk</td>
                                <td th:text="${ing.unit}">ml</td>
                                <td>
                                    <span th:text="${ing.stockQuantity}"
                                        th:classappend="${ing.stockQuantity < 100 ? 'text-danger fw-bold' : 'text-success'}">500</span>
                                </td>
                                <td th:text="${#numbers.formatDecimal(ing.costPerUnit, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                                    1,000 đ</td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${ing.stockQuantity > 100 ? 'bg-success' : (ing.stockQuantity > 0 ? 'bg-warning text-dark' : 'bg-danger')}"
                                        th:text="${ing.stockQuantity > 100 ? 'In Stock' : (ing.stockQuantity > 0 ? 'Low Stock' : 'Out of Stock')}">In
                                        Stock</span>
                                </td>
                                <td>
                                    <!-- Restock Button -->
                                    <button class="btn btn-sm btn-success" data-bs-toggle="modal"
                                        th:data-bs-target="'#restockModal' + ${ing.id}">
                                        <i class="fas fa-plus"></i> Restock
                                    </button>
                                    <!-- Delete Button -->
                                    <a th:href="@{/admin/ingredients/delete/{id}(id=${ing.id})}"
                                        class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Delete this ingredient?')">
                                        <i class="fas fa-trash"></i>
                                    </a>

                                    <!-- Restock Modal -->
                                    <div class="modal fade" th:id="'restockModal' + ${ing.id}" tabindex="-1">
                                        <div class="modal-dialog">
                                            <form th:action="@{/admin/ingredients/restock/{id}(id=${ing.id})}"
                                                method="post" class="modal-content">
                                                <div class="modal-header">
                                                    <h5 class="modal-title fw-bold">Restock:
                                                        <span th:text="${ing.name}"></span>
                                                    </h5>
                                                    <button type="button" class="btn-close"
                                                        data-bs-dismiss="modal"></button>
                                                </div>
                                                <div class="modal-body">
                                                    <div class="mb-3">
                                                        <label class="form-label">Current Stock</label>
                                                        <input type="text" class="form-control" disabled
                                                            th:value="${ing.stockQuantity} + ' ' + ${ing.unit}">
                                                    </div>
                                                    <div class="mb-3">
                                                        <label class="form-label fw-bold">Add Amount</label>
                                                        <input type="number" name="amount" class="form-control"
                                                            placeholder="e.g. 500" required min="1">
                                                    </div>
                                                </div>
                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-secondary"
                                                        data-bs-dismiss="modal">Cancel</button>
                                                    <button type="submit" class="btn btn-success">Add Stock</button>
                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(ingredients)}">
                                <td colspan="6" class="text-center py-4 text-muted">No ingredients found. Add some to
                                    get started!</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <div
            th:replace="~{admin/fragments/pagination :: pagination(${page}, ${totalPages}, '/admin/ingredients', ${search}, 'page')}">
        </div>

        <!-- Add Ingredient Modal -->
        <div class="modal fade" id="addIngredientModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <form th:action="@{/admin/ingredients/save}" th:object="${newIngredient}" method="post"
                    class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title fw-bold">Add New Ingredient</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Ingredient Name</label>
                                <input type="text" th:field="*{name}" class="form-control"
                                    placeholder="e.g. Milk, Coffee Beans" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Unit of Measurement</label>
                                <input type="text" th:field="*{unit}" class="form-control" placeholder="e.g. ml, g, pcs"
                                    required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Initial Stock Quantity</label>
                                <input type="number" th:field="*{stockQuantity}" class="form-control" placeholder="0"
                                    min="0">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Cost Per Unit (vnđ)</label>
                                <input type="number" th:field="*{costPerUnit}" class="form-control" placeholder="0"
                                    min="0">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Ingredient</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
