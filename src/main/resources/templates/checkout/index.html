<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">

<head>
    <title>Checkout - The Coffee House</title>
</head>

<body>
    <div th:fragment="content">
        <div class="container py-5 mt-5">
            <h1 class="fw-bold mb-4 display-5 text-center" th:text="#{checkout.title}">Checkout</h1>

            <div class="row g-5">
                <!-- Order Summary (Left/Top on mobile) -->
                <div class="col-md-5 col-lg-4 order-md-last">
                    <h4 class="d-flex justify-content-between align-items-center mb-3">
                        <span class="text-primary fw-bold" th:text="#{checkout.your_order}">Your Order</span>
                        <span class="badge bg-primary rounded-pill" th:text="${cart.totalItems}">3</span>
                    </h4>
                    <ul class="list-group mb-3 shadow-sm rounded-4 overflow-hidden border-0">
                        <li class="list-group-item d-flex justify-content-between lh-sm" th:each="item : ${cart.items}">
                            <div>
                                <h6 class="my-0 fw-bold"
                                    th:text="${#locale.language == 'vi' && item.productNameVi != null ? item.productNameVi : item.productName}">
                                    Product Name</h6>
                                <small class="text-muted" th:text="${item.sizeName}">Size</small>
                                <small class="text-muted d-block" th:if="${!item.toppingNames.empty}"
                                    th:text="${( #locale.language == 'vi' ? 'Topping: ' : 'Toppings: ') + #strings.listJoin(item.toppingNames, ', ')}"></small>
                                <small class="text-muted d-block" th:text="${'x' + item.quantity}"></small>
                            </div>
                            <span class="text-muted fw-bold"
                                th:text="${#numbers.formatDecimal(item.total, 0, 'COMMA', 0, 'POINT')} + ' đ'">120,000
                                đ</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between bg-light fw-bold">
                            <span th:text="#{checkout.total}">Total (VND)</span>
                            <span class="text-primary"
                                th:text="${#numbers.formatDecimal(cart.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">360,000
                                đ</span>
                        </li>
                    </ul>
                </div>

                <!-- Billing Details -->
                <div class="col-md-7 col-lg-8">
                    <h4 class="mb-3 fw-bold" th:text="#{checkout.billing}">Billing Details</h4>
                    <form class="needs-validation" method="post" th:action="@{/checkout/place-order}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="customerName" class="form-label fw-bold" th:text="#{checkout.fullname}">Full
                                     Name</label>
                                <input type="text" class="form-control rounded-3 py-2" id="customerName"
                                     name="customerName" th:value="${user != null ? user.fullName : ''}" required>
                            </div>

                            <div class="col-md-6">
                                <label for="phone" class="form-label fw-bold" th:text="#{checkout.phone}">Phone
                                     Number</label>
                                <input type="tel" class="form-control rounded-3 py-2" id="phone" name="phone"
                                     th:value="${user != null ? user.phone : ''}" required pattern="0[35789][0-9]{8}"
                                     th:title="#{checkout.phone.error}">
                            </div>

                            <div class="col-md-6">
                                <label for="address" class="form-label fw-bold"
                                     th:text="#{checkout.address}">Address</label>
                                <input type="text" class="form-control rounded-3 py-2" id="address" name="address"
                                     placeholder="1234 Main St" required>
                            </div>

                            <div class="col-md-6">
                                <label for="note" class="form-label fw-bold" th:text="#{checkout.note}">Order Note
                                     (Optional)</label>
                                <textarea class="form-control rounded-3" id="note" name="note" rows="3"></textarea>
                            </div>
                        </div>

                        <hr class="my-4">

                        <!-- Payment Method Dummy -->
                        <h4 class="mb-3 fw-bold" th:text="#{checkout.payment}">Payment Method</h4>
                        <div class="my-3">
                            <div class="form-check">
                                <input id="cod" name="paymentMethod" type="radio" class="form-check-input" checked
                                    required>
                                <label class="form-check-label fw-bold" for="cod" th:text="#{checkout.cod}">Cash on
                                    Delivery (COD)</label>
                            </div>
                        </div>

                        <hr class="my-4">

                        <button class="w-50 btn btn-primary btn-lg rounded-pill shadow-lg fw-bold py-3" type="submit"
                            th:text="#{checkout.place}">Place Order</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
