<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">

<head>
    <title>Order Success - The Coffee House</title>
</head>

<body>
    <div th:fragment="content">
        <div class="container py-5 mt-5 text-center">
            <div class="py-5">
                <i class="fas fa-check-circle fa-5x text-success mb-4"></i>
                <h1 class="display-5 fw-bold mb-3" th:text="#{success.title}">Order Placed Successfully!</h1>
                <p class="lead mb-4"><span th:text="#{success.message}">Thank you for ordering with us.</span> <span
                        th:text="#{success.order_number} + ' #' + ${order.id}">Your order number is #123.</span></p>

                <div class="alert alert-info d-inline-block px-5 py-3 rounded-4 mb-4">
                    <h5 class="mb-2" th:text="#{success.tracking_code}">Your Tracking Code</h5>
                    <h2 class="fw-bold text-primary mb-0" th:text="${order.trackingCode}">ORD-XXXX</h2>
                    <small class="text-muted" th:text="#{success.tracking_instruction}">Use this code to check your
                        order status.</small>
                </div>

                <div class="d-flex justify-content-center gap-2">
                    <a href="/tracking" class="btn btn-outline-primary rounded-pill px-5 py-2 fw-bold"
                        th:text="#{success.track_btn}">Track Order</a>
                    <a href="/#menu" class="btn btn-primary rounded-pill px-5 py-2 fw-bold"
                        th:text="#{cart.continue}">Continue Shopping</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
