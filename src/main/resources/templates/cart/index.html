<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">

<head>
    <title>Shopping Cart - The Coffee House</title>
</head>

<body>
    <div th:fragment="content">
        <div class="container py-5 mt-5">
            <h1 class="fw-bold mb-5 display-5">Shopping Cart</h1>

            <div class="row g-5">
                <!-- Cart Items -->
                <div th:class="${cart.items.empty} ? 'col-12' : 'col-lg-8'">
                    <div th:if="${cart.items.empty}" class="text-center py-5 bg-light rounded-4">
                        <i class="fas fa-shopping-basket fa-3x text-muted mb-3"></i>
                        <p class="fs-4 text-muted" th:text="#{cart.empty}">Your cart is empty.</p>
                        <a href="/#menu" class="btn btn-primary rounded-pill px-4 mt-3"
                            th:text="#{cart.start_ordering}">Start Ordering</a>
                    </div>

                    <div th:unless="${cart.items.empty}">
                        <div th:each="item, iterStat : ${cart.items}"
                            class="card mb-3 border-0 shadow-sm rounded-4 overflow-hidden">
                            <div class="row g-0 align-items-center">
                                <div class="col-md-3">
                                    <img th:src="${item.productImage != null ? item.productImage : 'https://via.placeholder.com/150'}"
                                        class="img-fluid h-100 w-100" style="object-fit: cover; min-height: 150px;"
                                        alt="Product">
                                </div>
                                <div class="col-md-9">
                                    <div class="card-body">
                                        <div class="d-flex justify-content-between align-items-start mb-2">
                                            <div>
                                                <h4 class="card-title fw-bold mb-1"
                                                    th:text="${#locale.language == 'vi' && item.productNameVi != null ? item.productNameVi : item.productName}">
                                                    Product Name</h4>
                                                <p class="mb-1 text-muted">
                                                    Size: <span class="fw-bold" th:text="${item.sizeName}">L</span>
                                                </p>
                                                <p class="mb-1 text-muted small" th:if="${!item.toppingNames.empty}">
                                                    Toppings: <span
                                                        th:text="${#strings.listJoin(item.toppingNames, ', ')}">Pearl</span>
                                                </p>
                                                <p class="mb-0 text-muted small fst-italic"
                                                    th:if="${item.note != null && !item.note.isEmpty()}">
                                                    Note: <span th:text="${item.note}"></span>
                                                </p>
                                            </div>
                                            <div class="text-end">
                                                <h5 class="fw-bold text-primary mb-0"
                                                    th:text="${item.total != null ? #numbers.formatDecimal(item.total, 0, 'COMMA', 0, 'POINT') : '0'} + ' đ'">
                                                    50,000 đ</h5>
                                                <small class="text-muted" th:text="${item.price} + ' đ/cup'"></small>
                                            </div>
                                        </div>

                                        <div class="d-flex justify-content-between align-items-center mt-3">
                                            <form th:action="@{/cart/update}" method="post"
                                                class="d-flex align-items-center">
                                                <input type="hidden" name="index" th:value="${iterStat.index}">
                                                <div class="input-group input-group-sm" style="width: 160px;">
                                                    <button class="btn btn-outline-dark py-0" type="button"
                                                        style="height: 30px;"
                                                        onclick="this.parentNode.querySelector('input[type=number]').stepDown(); this.form.submit();">-</button>
                                                    <input type="number" name="quantity"
                                                        class="form-control text-center fw-bold"
                                                        th:value="${item.quantity}" min="1" max="99" readonly
                                                        style="height: 30px;">
                                                    <button class="btn btn-outline-dark py-0" type="button"
                                                        style="height: 30px;"
                                                        onclick="this.parentNode.querySelector('input[type=number]').stepUp(); this.form.submit();">+</button>
                                                </div>
                                            </form>

                                            <a th:href="@{'/cart/remove/' + ${iterStat.index}}"
                                                class="btn btn-outline-danger btn-sm rounded-circle p-2" title="Remove">
                                                <i class="fas fa-trash-alt"></i>
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="col-lg-4" th:unless="${cart.items.empty}">
                    <div class="card border-0 shadow-lg rounded-4 p-4 sticky-top" style="top: 100px;">
                        <h3 class="fw-bold mb-4" th:text="#{cart.summary}">Order Summary</h3>

                        <div class="d-flex justify-content-between mb-3">
                            <span class="text-muted"><span th:text="#{cart.subtotal}">Subtotal</span> (<span
                                    th:text="${cart.totalItems}">2</span> items)</span>
                            <span class="fw-bold"
                                th:text="${cart.totalAmount != null ? #numbers.formatDecimal(cart.totalAmount, 0, 'COMMA', 0, 'POINT') : '0'} + ' đ'">100,000
                                đ</span>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex justify-content-between mb-4">
                            <span class="h4 fw-bold" th:text="#{checkout.total}">Total</span>
                            <span class="h4 fw-bold text-primary"
                                th:text="${cart.totalAmount != null ? #numbers.formatDecimal(cart.totalAmount, 0, 'COMMA', 0, 'POINT') : '0'} + ' đ'">100,000
                                đ</span>
                        </div>

                        <div class="d-grid gap-2">
                            <a href="/checkout" class="btn btn-primary btn-lg rounded-pill shadow fw-bold py-3"
                                th:text="#{cart.proceed}">
                                Proceed to Checkout
                            </a>
                            <a href="/#menu" class="btn btn-outline-dark rounded-pill fw-bold py-2"
                                th:text="#{cart.continue}">
                                Continue Shopping
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
